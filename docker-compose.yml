version: "3.9"

services:
  ollama-admin:
    image: ghcr.io/ollama-admin/ollama-admin:${VERSION:-latest}
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/data/ollama-admin.db}
      DEFAULT_OLLAMA_URL: ${DEFAULT_OLLAMA_URL:-http://host.docker.internal:11434}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-changeme}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-90}
      LOG_STORE_PROMPTS: ${LOG_STORE_PROMPTS:-true}
      CATALOG_REFRESH_ENABLED: ${CATALOG_REFRESH_ENABLED:-true}
      CATALOG_RATE_LIMIT_MS: ${CATALOG_RATE_LIMIT_MS:-2000}
      GPU_AGENT_ENABLED: ${GPU_AGENT_ENABLED:-false}
    volumes:
      - ollama-admin-data:/data
    restart: unless-stopped

  # Optional: PostgreSQL (uncomment to use instead of SQLite)
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: ollamaadmin
  #     POSTGRES_PASSWORD: changeme
  #     POSTGRES_DB: ollamaadmin
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   restart: unless-stopped
  # Then set: DATABASE_URL=postgresql://ollamaadmin:changeme@postgres:5432/ollamaadmin

  # Optional: GPU monitoring agent
  # Set GPU_AGENT_URL to http://gpu-agent:11435 in your server config after enabling.
  #
  # NVIDIA (requires NVIDIA Container Toolkit on host):
  # gpu-agent:
  #   image: ghcr.io/ollama-admin/ollama-admin-gpu-agent:${VERSION:-latest}
  #   build: ./gpu-agent
  #   environment:
  #     GPU_BACKEND: nvidia
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   ports:
  #     - "11435:11435"
  #   restart: unless-stopped
  #
  # AMD (requires ROCm drivers on host):
  # gpu-agent:
  #   image: ghcr.io/ollama-admin/ollama-admin-gpu-agent:${VERSION:-latest}
  #   build: ./gpu-agent
  #   environment:
  #     GPU_BACKEND: amd
  #   devices:
  #     - /dev/kfd:/dev/kfd
  #     - /dev/dri:/dev/dri
  #   group_add:
  #     - video
  #     - render
  #   ports:
  #     - "11435:11435"
  #   restart: unless-stopped

volumes:
  ollama-admin-data:
  # postgres-data:
