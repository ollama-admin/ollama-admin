name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit

  prepare:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      has_gpu_agent: ${{ steps.version.outputs.has_gpu_agent }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version and check tag
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists. Bump version in package.json."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=$(echo "$VERSION" | cut -d. -f1)" >> "$GITHUB_OUTPUT"
          echo "minor=$(echo "$VERSION" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"
          echo "has_gpu_agent=$(test -f gpu-agent/Dockerfile && echo true || echo false)" >> "$GITHUB_OUTPUT"

  build-app:
    needs: prepare
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"
        env:
          digest: ${{ steps.build.outputs.digest }}

      - uses: actions/upload-artifact@v4
        with:
          name: app-digest-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-gpu-agent:
    needs: prepare
    if: needs.prepare.outputs.has_gpu_agent == 'true'
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./gpu-agent
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }}-gpu-agent,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"
        env:
          digest: ${{ steps.build.outputs.digest }}

      - uses: actions/upload-artifact@v4
        with:
          name: gpu-agent-digest-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [prepare, build-app, build-gpu-agent]
    if: always() && needs.build-app.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download app digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/app
          pattern: app-digest-*
          merge-multiple: true

      - name: Create and push app manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest \
            -t ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.version }} \
            -t ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.minor }} \
            -t ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.major }} \
            -t ghcr.io/${{ github.repository }}:sha-${{ needs.prepare.outputs.short_sha }} \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' $(ls /tmp/digests/app/))

      - name: Download gpu-agent digests
        if: needs.build-gpu-agent.result == 'success'
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/gpu-agent
          pattern: gpu-agent-digest-*
          merge-multiple: true

      - name: Create and push gpu-agent manifest
        if: needs.build-gpu-agent.result == 'success'
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}-gpu-agent:latest \
            -t ghcr.io/${{ github.repository }}-gpu-agent:${{ needs.prepare.outputs.version }} \
            -t ghcr.io/${{ github.repository }}-gpu-agent:${{ needs.prepare.outputs.minor }} \
            -t ghcr.io/${{ github.repository }}-gpu-agent:${{ needs.prepare.outputs.major }} \
            -t ghcr.io/${{ github.repository }}-gpu-agent:sha-${{ needs.prepare.outputs.short_sha }} \
            $(printf 'ghcr.io/${{ github.repository }}-gpu-agent@sha256:%s ' $(ls /tmp/digests/gpu-agent/))

      - name: Create git tag and GitHub Release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.prepare.outputs.version }}" -m "Release ${{ needs.prepare.outputs.version }}"
          git push origin "v${{ needs.prepare.outputs.version }}"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
