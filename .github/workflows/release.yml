name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    # Skip version-bump commits to avoid infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Determine bump type from PR labels (default: patch)
      - name: Get PR labels
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the PR number from the merge commit
          PR_NUMBER=$(gh pr list --state merged --json number,mergeCommit \
            --jq ".[] | select(.mergeCommit.oid == \"${{ github.sha }}\") | .number")

          BUMP="patch"
          if [ -n "$PR_NUMBER" ]; then
            LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name')
            if echo "$LABELS" | grep -q "^major$"; then
              BUMP="major"
            elif echo "$LABELS" | grep -q "^minor$"; then
              BUMP="minor"
            fi
          fi
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Version bump: $BUMP (PR #$PR_NUMBER)"

      # Bump version in package.json
      - name: Bump version
        id: version
        run: |
          npm version ${{ steps.pr.outputs.bump }} --no-git-tag-version
          VERSION=$(jq -r .version package.json)
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "New version: $VERSION"

      # Commit version bump back to main
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git push origin main

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- ollama-admin app ---
      - name: Build and push app
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.minor }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.major }}
            ghcr.io/${{ github.repository }}:sha-${{ steps.version.outputs.short_sha }}

      # --- gpu-agent ---
      - name: Check gpu-agent Dockerfile exists
        id: gpu_agent
        run: echo "exists=$(test -f gpu-agent/Dockerfile && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Build and push gpu-agent
        if: steps.gpu_agent.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./gpu-agent
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}-gpu-agent:latest
            ghcr.io/${{ github.repository }}-gpu-agent:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}-gpu-agent:${{ steps.version.outputs.minor }}
            ghcr.io/${{ github.repository }}-gpu-agent:${{ steps.version.outputs.major }}
            ghcr.io/${{ github.repository }}-gpu-agent:sha-${{ steps.version.outputs.short_sha }}

      # --- Git tag + GitHub Release ---
      - name: Create git tag
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
